<style>

    * {

      margin: 0;

      padding: 0;

      box-sizing: border-box;

    }

    html, body {

      height: 100%;

      font-family: Arial, sans-serif;

    }

    body {

      background: #000;

    }

    .hero {

      position: relative;

      min-height: 100vh;

      overflow: hidden;

      display: flex;

      align-items: flex-end;

      justify-content: center;

    }

    .slideshow {

      position: absolute;

      inset: 0;

      z-index: 0;

    }

    .slide {

      position: absolute;

      inset: 0;

      background-size: cover;

      background-position: center;

      opacity: 0;

      animation: fadeSlides 15s infinite;

      transform: scale(1.03);

    }

    .slide::after {

      content: "";

      position: absolute;

      inset: 0;

      background: linear-gradient(

        to bottom,

        rgba(0, 0, 0, 0.75) 0%,

        rgba(0, 0, 0, 0.45) 45%,

        rgba(224, 177, 117, 0.9) 100%

      );

    }

    .slide:nth-child(1) {

      background-image: url("image(18).jpeg");

      animation-delay: 0s;

    }

    .slide:nth-child(2) {

      background-image: url("image(19).jpeg");

      animation-delay: 5s;

    }

    .slide:nth-child(3) {

      background-image: url("image(20).jpeg");

      animation-delay: 10s;

    }
.slide img {
  width: 100%;
  height: 100vh;
  object-fit: cover;
}
@keyframes zoom {
  from { transform: scale(1); }
  to { transform: scale(1.1); }
}

    @keyframes fadeSlides {

      0%   { opacity: 0; }

      8%   { opacity: 1; }

      30%  { opacity: 1; }

      38%  { opacity: 0; }

      100% { opacity: 0; }

    }

    .content {

      position: relative;

      z-index: 2;

      width: 100%;

      max-width: 420px;

      padding: 40px 20px 35px;

      color: white;

    }

    .headline {

      margin-bottom: 8px;

    }

    .headline h1 {

      font-size: clamp(52px, 12vw, 82px);

      font-weight: 300;

      line-height: 0.95;

      letter-spacing: -2px;

    }

    .tag {

      font-size: 20px;

      margin: 8px 0 24px;

      color: rgba(255,255,255,0.9);

    }

    .listen-btn {

      display: inline-block;

      background: #fff;

      color: #000;

      text-decoration: none;

      padding: 14px 28px;

      font-size: 16px;

      font-weight: bold;

      margin-bottom: 48px;

    }

    .socials {

      display: flex;

      justify-content: center;

      gap: 24px;

      font-size: 30px;

      margin-bottom: 38px;

    }

    .socials a {

      color: #000;

      transition: opacity 0.2s ease;

    }

    .socials a:hover {

      opacity: 0.65;

    }

    .newsletter {

      text-align: center;

    }

    .newsletter h2 {

      color: #000;

      font-size: 20px;

      font-weight: 800;

      margin-bottom: 6px;

    }

    .newsletter p {

      color: #000;

      font-size: 14px;

      text-transform: uppercase;

      margin-bottom: 18px;

    }

    .form-row {

      display: flex;

      gap: 10px;

      margin-bottom: 24px;

    }

    .form-row input {

      flex: 1;

      padding: 18px 16px;

      border: none;

      font-size: 16px;

      outline: none;

    }

    .form-row button {

      padding: 18px 22px;

      border: none;

      background: #000;

      color: #fff;

      font-size: 16px;

      font-weight: bold;

      cursor: pointer;

    }

    .footer {

      text-align: center;

      color: #000;

      font-size: 14px;

      font-weight: 600;

    }

    @media (max-width: 480px) {

      .headline h1 {

        font-size: 64px;

      }

      .socials {

        gap: 18px;

        font-size: 26px;

      }

      .form-row {

        flex-direction: column;

      }

      .form-row button {

        width: 100%;

      }

    }
</style>
